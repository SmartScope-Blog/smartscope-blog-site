<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">実行リスクとやめるべき条件</title>
  <desc id="desc">5%ルール活用戦略の実行リスクとキルクライテリアを左右2カラムで整理した図</desc>
  <rect width="800" height="430" fill="#ffffff"/>

  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1E293B">使える条件と、やめるべき条件はセットで見る</text>

  <rect x="46" y="72" width="332" height="250" rx="16" fill="#FBE7DF" stroke="#D85A30" stroke-width="2.5"/>
  <text x="212" y="104" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#A63E19">実行リスク</text>
  <text x="70" y="140" font-family="sans-serif" font-size="14" fill="#7A2F12">・filing当日ギャップで利益の大半が消化される</text>
  <text x="70" y="176" font-family="sans-serif" font-size="14" fill="#7A2F12">・小型株偏重で流動性が不足する</text>
  <text x="70" y="212" font-family="sans-serif" font-size="14" fill="#7A2F12">・提出者辞書のメンテナンス負荷が高い</text>
  <text x="70" y="248" font-family="sans-serif" font-size="14" fill="#7A2F12">・filing lagが長い案件は stale signal 化する</text>

  <rect x="422" y="72" width="332" height="250" rx="16" fill="#FDE6E2" stroke="#E24B4A" stroke-width="2.5"/>
  <text x="588" y="104" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#A62E30">やめるべき条件</text>
  <text x="446" y="140" font-family="sans-serif" font-size="14" fill="#8E1F23">・t+1以降のalphaがほぼ消える</text>
  <text x="446" y="176" font-family="sans-serif" font-size="14" fill="#8E1F23">・片道30bp程度のコストで優位性が消滅する</text>
  <text x="446" y="212" font-family="sans-serif" font-size="14" fill="#8E1F23">・収益源が数件の有名アクティビストに集中する</text>
  <text x="446" y="248" font-family="sans-serif" font-size="14" fill="#8E1F23">・流動性フィルタ後の件数が薄すぎる</text>

  <rect x="78" y="346" width="644" height="54" rx="14" fill="#EAF6F1" stroke="#1D9E75" stroke-width="3"/>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0E5A40">うまくいく条件</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">liquid names限定 / t+20でnet positive / pre-postで符号安定 / filer type×purposeの2軸で再現可能</text>
</svg>
