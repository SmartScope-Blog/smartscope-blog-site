<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340" role="img" aria-labelledby="title desc">
  <title id="title">エントリーとエグジットのタイムライン</title>
  <desc id="desc">filing公開からt+1エントリー、保有期間、エグジット条件までを示す横型タイムライン</desc>
  <rect width="800" height="340" fill="#ffffff"/>
  <defs>
    <marker id="arrow-v6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#888780"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1E293B">入る日と出る条件を、先に固定する</text>
  <line x1="100" y1="124" x2="700" y2="124" stroke="#888780" stroke-width="3" marker-end="url(#arrow-v6)"/>

  <rect x="50" y="88" width="150" height="72" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="2"/>
  <text x="125" y="116" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5F5E5A">filing公開 (t=0)</text>
  <text x="125" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">当日ギャップは</text>
  <text x="125" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">追わない</text>

  <rect x="240" y="88" width="150" height="72" rx="12" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2"/>
  <text x="315" y="116" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#0E5A40">エントリー (t+1)</text>
  <text x="315" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">翌営業日の</text>
  <text x="315" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">寄り or 引け</text>

  <rect x="430" y="88" width="150" height="72" rx="12" fill="#F7F7F4" stroke="#888780" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="505" y="116" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5F5E5A">保有期間</text>
  <text x="505" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">等金額バスケット</text>
  <text x="505" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">必要ならTOPIXヘッジ</text>

  <rect x="620" y="88" width="150" height="72" rx="12" fill="#FCECCF" stroke="#EF9F27" stroke-width="2"/>
  <text x="695" y="116" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#8A5A12">エグジット</text>
  <text x="695" y="140" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">以下のいずれか</text>
  <text x="695" y="156" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">早い方</text>

  <rect x="610" y="192" width="170" height="30" rx="8" fill="#FFF7EA" stroke="#EF9F27"/>
  <rect x="610" y="228" width="170" height="30" rx="8" fill="#FFF7EA" stroke="#EF9F27"/>
  <rect x="610" y="264" width="170" height="30" rx="8" fill="#FFF7EA" stroke="#EF9F27"/>
  <text x="695" y="212" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">減少報告書が出た</text>
  <text x="695" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">TOB / MBOが発表された</text>
  <text x="695" y="284" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">20 or 60営業日到達</text>
</svg>
