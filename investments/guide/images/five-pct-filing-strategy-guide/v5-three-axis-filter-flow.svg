<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">3軸フィルタリングのフロー</title>
  <desc id="desc">EDINETの大量保有報告書を提出者タイプ、保有目的、初回か積み増しかの3軸で絞り込むフローチャート</desc>
  <rect width="800" height="440" fill="#ffffff"/>
  <defs>
    <marker id="arrow-v5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#666560"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1E293B">制度イベントを、3軸だけでふるいにかける</text>

  <rect x="130" y="64" width="220" height="52" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="2"/>
  <text x="240" y="87" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#5F5E5A">EDINET 大量保有報告書</text>
  <text x="240" y="104" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">入力イベント</text>

  <rect x="130" y="136" width="220" height="60" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="240" y="160" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#463F9F">軸1: 提出者タイプ</text>
  <text x="240" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#463F9F">アクティビスト or 事業会社?</text>

  <rect x="130" y="226" width="220" height="60" rx="12" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2"/>
  <text x="240" y="250" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0E5A40">軸2: 保有目的</text>
  <text x="240" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">重要提案 or 事業提携?</text>

  <rect x="130" y="316" width="220" height="60" rx="12" fill="#FCECCF" stroke="#EF9F27" stroke-width="2"/>
  <text x="240" y="340" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#8A5A12">軸3: 初回 or 積み増し</text>
  <text x="240" y="360" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">初回5%超 or +1%増加?</text>

  <rect x="130" y="394" width="220" height="32" rx="12" fill="#EAF6F1" stroke="#1D9E75" stroke-width="3"/>
  <text x="240" y="415" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0E5A40">イベントバスケットに追加</text>

  <line x1="240" y1="116" x2="240" y2="136" stroke="#666560" stroke-width="2" marker-end="url(#arrow-v5)"/>
  <line x1="240" y1="196" x2="240" y2="226" stroke="#666560" stroke-width="2" marker-end="url(#arrow-v5)"/>
  <line x1="240" y1="286" x2="240" y2="316" stroke="#666560" stroke-width="2" marker-end="url(#arrow-v5)"/>
  <line x1="240" y1="376" x2="240" y2="394" stroke="#666560" stroke-width="2" marker-end="url(#arrow-v5)"/>

  <line x1="350" y1="166" x2="520" y2="166" stroke="#B3B1A8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow-v5)"/>
  <line x1="350" y1="256" x2="520" y2="256" stroke="#B3B1A8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow-v5)"/>
  <line x1="350" y1="346" x2="520" y2="346" stroke="#B3B1A8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow-v5)"/>

  <rect x="540" y="150" width="120" height="32" rx="10" fill="#F6F5F1" stroke="#B3B1A8"/>
  <text x="600" y="171" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6E6D66">除外: パッシブ</text>

  <rect x="540" y="240" width="120" height="32" rx="10" fill="#F6F5F1" stroke="#B3B1A8"/>
  <text x="600" y="261" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6E6D66">除外: 純投資</text>

  <rect x="540" y="330" width="120" height="32" rx="10" fill="#F6F5F1" stroke="#B3B1A8"/>
  <text x="600" y="351" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6E6D66">除外: 減少報告</text>
</svg>
