<svg xmlns="http://www.w3.org/2000/svg" width="800" height="432" viewBox="0 0 800 432" role="img" aria-labelledby="title desc">
  <title id="title">提出者3タイプの比較</title>
  <desc id="desc">アクティビスト、パッシブ運用、事業会社の3タイプを行動と株価影響で比較する図</desc>
  <rect width="800" height="432" fill="#ffffff"/>

  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#1E293B">同じ5%超でも、誰が買ったかで意味が全く違う</text>

  <rect x="34" y="82" width="232" height="296" rx="16" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2.5"/>
  <text x="150" y="118" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#463F9F">アクティビスト</text>
  <text x="150" y="142" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#463F9F">（物言う株主）</text>
  <rect x="104" y="164" width="92" height="30" rx="15" fill="#DFF4EA" stroke="#1D9E75"/>
  <text x="150" y="184" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0E5A40">影響: 大</text>
  <text x="60" y="232" font-family="sans-serif" font-size="15" font-weight="700" fill="#2F285E">行動</text>
  <text x="60" y="260" font-family="sans-serif" font-size="15" fill="#2F285E">増配要求・自社株買い・</text>
  <text x="60" y="284" font-family="sans-serif" font-size="15" fill="#2F285E">事業再編提案</text>
  <text x="60" y="324" font-family="sans-serif" font-size="15" font-weight="700" fill="#2F285E">株価影響</text>
  <text x="60" y="352" font-family="sans-serif" font-size="15" fill="#2F285E">初回filingで平均</text>
  <text x="60" y="376" font-family="sans-serif" font-size="15" fill="#2F285E">+1.8%超過リターン研究</text>

  <rect x="284" y="82" width="232" height="296" rx="16" fill="#F1EFE8" stroke="#9A9487" stroke-width="2.5"/>
  <text x="400" y="118" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#5F5E5A">パッシブ運用</text>
  <text x="400" y="142" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5F5E5A">（インデックス型）</text>
  <rect x="354" y="164" width="92" height="30" rx="15" fill="#FDE6E2" stroke="#E24B4A"/>
  <text x="400" y="184" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#A62E30">影響: 小</text>
  <text x="310" y="232" font-family="sans-serif" font-size="15" font-weight="700" fill="#4B4A45">行動</text>
  <text x="310" y="260" font-family="sans-serif" font-size="15" fill="#4B4A45">指数リバランスで</text>
  <text x="310" y="284" font-family="sans-serif" font-size="15" fill="#4B4A45">機械的に閾値超え</text>
  <text x="310" y="324" font-family="sans-serif" font-size="15" font-weight="700" fill="#4B4A45">株価影響</text>
  <text x="310" y="352" font-family="sans-serif" font-size="15" fill="#4B4A45">経営に関与せず、</text>
  <text x="310" y="376" font-family="sans-serif" font-size="15" fill="#4B4A45">情報価値は限定的</text>

  <rect x="534" y="82" width="232" height="296" rx="16" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2.5"/>
  <text x="650" y="118" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#0E5A40">事業会社</text>
  <text x="650" y="142" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0E5A40">（戦略的保有）</text>
  <rect x="590" y="164" width="120" height="30" rx="15" fill="#E3EEFB" stroke="#378ADD"/>
  <text x="650" y="184" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#185FA5">影響: 中〜大</text>
  <text x="560" y="232" font-family="sans-serif" font-size="15" font-weight="700" fill="#0E5A40">行動</text>
  <text x="560" y="260" font-family="sans-serif" font-size="15" fill="#0E5A40">業務提携・買収前段階・</text>
  <text x="560" y="284" font-family="sans-serif" font-size="15" fill="#0E5A40">長期保有</text>
  <text x="560" y="324" font-family="sans-serif" font-size="15" font-weight="700" fill="#0E5A40">株価影響</text>
  <text x="560" y="352" font-family="sans-serif" font-size="15" fill="#0E5A40">TOBやMBOに発展する</text>
  <text x="560" y="376" font-family="sans-serif" font-size="15" fill="#0E5A40">可能性がある</text>
</svg>
