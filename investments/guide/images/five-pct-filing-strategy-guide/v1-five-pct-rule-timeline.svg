<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280" role="img" aria-labelledby="title desc">
  <title id="title">5%ルールのタイムライン</title>
  <desc id="desc">保有比率5%超から報告書提出、EDINET公開、変更報告までの流れと最大5営業日のラグを示す横型タイムライン</desc>
  <rect width="800" height="280" fill="#ffffff"/>
  <defs>
    <marker id="arrow-v1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#888780"/>
    </marker>
  </defs>

  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#19473b">5%ルールは「取得日」と「読まれる日」がずれる</text>

  <line x1="92" y1="128" x2="708" y2="128" stroke="#888780" stroke-width="3" marker-end="url(#arrow-v1)"/>

  <rect x="50" y="92" width="150" height="74" rx="12" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2"/>
  <text x="125" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#0E5A40">保有比率5%超</text>
  <text x="125" y="144" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">株式の取得が</text>
  <text x="125" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">閾値を超えた日</text>

  <rect x="230" y="92" width="150" height="74" rx="12" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2"/>
  <text x="305" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#0E5A40">報告書提出</text>
  <text x="305" y="144" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">5営業日以内に</text>
  <text x="305" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0E5A40">金融庁へ提出</text>

  <rect x="410" y="92" width="150" height="74" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="2"/>
  <text x="485" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5F5E5A">EDINET公開</text>
  <text x="485" y="144" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">提出後すぐに</text>
  <text x="485" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">誰でも閲覧可能</text>

  <rect x="590" y="92" width="150" height="74" rx="12" fill="#FCECCF" stroke="#EF9F27" stroke-width="2"/>
  <text x="665" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#8A5A12">変更報告</text>
  <text x="665" y="144" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">以後1%以上</text>
  <text x="665" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8A5A12">変動ごとに提出</text>

  <line x1="138" y1="72" x2="138" y2="58" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="318" y1="72" x2="318" y2="58" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="138" y1="58" x2="318" y2="58" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="228" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">最大5営業日のラグ</text>

  <text x="400" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5F5E5A">このタイムラグの存在が、filing後にも情報が完全に織り込まれない理由の一つ</text>
</svg>
