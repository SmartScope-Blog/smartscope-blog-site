<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc">
  <title id="title">従来型とAI融合型パイプラインの比較</title>
  <desc id="desc">従来型の人間主導パイプラインと、AI融合型パイプラインの工程を比較する構造図。</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .container-old { fill: #f7f7f5; stroke: #cfcfc9; stroke-width: 1.5; }
    .container-ai { fill: #f1fbf7; stroke: #1d9e75; stroke-width: 1.5; }
    .box-old { fill: #ffffff; stroke: #888780; stroke-width: 1.3; }
    .box-ai { fill: #ffffff; stroke: #1d9e75; stroke-width: 1.3; }
    .label { font: 700 16px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .small { font: 12px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #565651; }
    .arrow-old { stroke: #888780; stroke-width: 2.4; fill: none; marker-end: url(#arrowOld); }
    .arrow-ai { stroke: #1d9e75; stroke-width: 2.4; fill: none; marker-end: url(#arrowAI); }
    .leader { stroke: #ccccca; stroke-width: 1.4; stroke-dasharray: 6 5; }
  </style>
  <defs>
    <marker id="arrowOld" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#888780"/>
    </marker>
    <marker id="arrowAI" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1d9e75"/>
    </marker>
  </defs>
  <rect width="800" height="360" fill="#ffffff" rx="24"/>
  <text x="30" y="34" class="title">従来型 vs AI融合型パイプライン</text>

  <rect x="26" y="54" width="748" height="102" rx="18" class="container-old"/>
  <text x="48" y="80" class="label">従来型パイプライン</text>
  <rect x="46" y="92" width="92" height="42" rx="14" class="box-old"/>
  <text x="92" y="118" text-anchor="middle" class="small">人間分析</text>
  <rect x="156" y="92" width="92" height="42" rx="14" class="box-old"/>
  <text x="202" y="118" text-anchor="middle" class="small">数式化</text>
  <rect x="266" y="92" width="92" height="42" rx="14" class="box-old"/>
  <text x="312" y="118" text-anchor="middle" class="small">コーディング</text>
  <rect x="376" y="92" width="92" height="42" rx="14" class="box-old"/>
  <text x="422" y="118" text-anchor="middle" class="small">バックテスト</text>
  <rect x="486" y="92" width="92" height="42" rx="14" class="box-old"/>
  <text x="532" y="118" text-anchor="middle" class="small">実行</text>
  <path d="M138 113 L156 113" class="arrow-old"/>
  <path d="M248 113 L266 113" class="arrow-old"/>
  <path d="M358 113 L376 113" class="arrow-old"/>
  <path d="M468 113 L486 113" class="arrow-old"/>

  <rect x="26" y="196" width="748" height="118" rx="18" class="container-ai"/>
  <text x="48" y="222" class="label" fill="#1d9e75">AI融合パイプライン</text>
  <rect x="46" y="236" width="82" height="46" rx="14" class="box-ai"/>
  <text x="87" y="262" text-anchor="middle" class="small">LLM仮説</text>
  <rect x="146" y="236" width="82" height="46" rx="14" class="box-ai"/>
  <text x="187" y="262" text-anchor="middle" class="small">AI特徴量</text>
  <rect x="246" y="236" width="82" height="46" rx="14" class="box-ai"/>
  <text x="287" y="262" text-anchor="middle" class="small">ML構築</text>
  <rect x="346" y="236" width="82" height="46" rx="14" class="box-ai"/>
  <text x="387" y="262" text-anchor="middle" class="small">自動検証</text>
  <rect x="446" y="236" width="82" height="46" rx="14" class="box-ai"/>
  <text x="487" y="262" text-anchor="middle" class="small">RL執行</text>
  <path d="M128 259 L146 259" class="arrow-ai"/>
  <path d="M228 259 L246 259" class="arrow-ai"/>
  <path d="M328 259 L346 259" class="arrow-ai"/>
  <path d="M428 259 L446 259" class="arrow-ai"/>

  <rect x="560" y="224" width="184" height="74" rx="16" class="box-ai" fill="#f7fcfa"/>
  <text x="580" y="246" class="small">人間の役割</text>
  <text x="580" y="264" class="small">因果仮説の設定</text>
  <text x="580" y="280" class="small">過学習防止の設計判断</text>
  <text x="580" y="296" class="small">リスク許容度の意思決定</text>

  <g fill="#7f77dd">
    <rect x="56" y="288" width="12" height="12" rx="3"/>
    <rect x="72" y="288" width="12" height="12" rx="3"/>
    <rect x="88" y="288" width="12" height="12" rx="3"/>
    <rect x="156" y="288" width="12" height="12" rx="3"/>
    <rect x="172" y="288" width="12" height="12" rx="3"/>
    <rect x="188" y="288" width="12" height="12" rx="3"/>
    <rect x="256" y="288" width="12" height="12" rx="3"/>
    <rect x="272" y="288" width="12" height="12" rx="3"/>
    <rect x="288" y="288" width="12" height="12" rx="3"/>
    <rect x="356" y="288" width="12" height="12" rx="3"/>
    <rect x="372" y="288" width="12" height="12" rx="3"/>
    <rect x="388" y="288" width="12" height="12" rx="3"/>
    <rect x="456" y="288" width="12" height="12" rx="3"/>
    <rect x="472" y="288" width="12" height="12" rx="3"/>
  </g>

  <line x1="92" y1="134" x2="87" y2="236" class="leader"/>
  <line x1="202" y1="134" x2="187" y2="236" class="leader"/>
  <line x1="312" y1="134" x2="287" y2="236" class="leader"/>
  <line x1="422" y1="134" x2="387" y2="236" class="leader"/>
  <line x1="532" y1="134" x2="487" y2="236" class="leader"/>
</svg>
