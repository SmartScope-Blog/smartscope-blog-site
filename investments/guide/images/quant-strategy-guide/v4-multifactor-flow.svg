<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" role="img" aria-labelledby="title desc">
  <title id="title">マルチファクター合成フロー</title>
  <desc id="desc">バリュー、モメンタム、クオリティ、低ボラティリティの4因子を合成スコア化し、ランキングとポートフォリオ構築に進む流れ。</desc>
  <style>
    .title { font: 700 24px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .node { stroke-width: 1.5; rx: 18; }
    .label { font: 700 16px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .small { font: 12px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #4f4f49; }
    .mid { font: 14px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #3d3d38; }
    .arrow { stroke: #888780; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .guide { stroke: #ccccca; stroke-width: 1.5; fill: none; marker-end: url(#arrowLight); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#888780"/>
    </marker>
    <marker id="arrowLight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#bbbbba"/>
    </marker>
  </defs>
  <rect width="800" height="300" fill="#ffffff" rx="24"/>
  <text x="30" y="36" class="title">マルチファクター合成のフロー</text>

  <rect x="20" y="64" width="160" height="78" class="node" fill="#eef5fd" stroke="#378add"/>
  <text x="100" y="94" text-anchor="middle" class="label">バリュー</text>
  <text x="100" y="118" text-anchor="middle" class="small">PER / PBR</text>

  <rect x="200" y="64" width="160" height="78" class="node" fill="#fff6e8" stroke="#ef9f27"/>
  <text x="280" y="94" text-anchor="middle" class="label">モメンタム</text>
  <text x="280" y="118" text-anchor="middle" class="small">12-1M リターン</text>

  <rect x="380" y="64" width="160" height="78" class="node" fill="#f4f1fd" stroke="#7f77dd"/>
  <text x="460" y="94" text-anchor="middle" class="label">クオリティ</text>
  <text x="460" y="118" text-anchor="middle" class="small">ROE / D-E</text>

  <rect x="560" y="64" width="160" height="78" class="node" fill="#effaf6" stroke="#1d9e75"/>
  <text x="640" y="94" text-anchor="middle" class="label">低ボラティリティ</text>
  <text x="640" y="118" text-anchor="middle" class="small">60日 σ</text>

  <rect x="258" y="182" width="220" height="82" class="node" fill="#f2f2ef" stroke="#888780"/>
  <text x="368" y="214" text-anchor="middle" class="label">合成スコアリング</text>
  <text x="368" y="238" text-anchor="middle" class="mid">ウェイト付き合成</text>

  <rect x="520" y="182" width="120" height="82" class="node" fill="#f7f7f5" stroke="#888780"/>
  <text x="580" y="214" text-anchor="middle" class="label">ランキング</text>
  <text x="580" y="238" text-anchor="middle" class="small">上位から並べる</text>

  <rect x="668" y="168" width="102" height="44" class="node" fill="#effaf6" stroke="#1d9e75"/>
  <text x="719" y="196" text-anchor="middle" class="small">上位ロング</text>
  <rect x="668" y="222" width="102" height="44" class="node" fill="#fdf0ec" stroke="#d85a30"/>
  <text x="719" y="250" text-anchor="middle" class="small">下位ショート</text>

  <path d="M100 142 L100 160 L308 160 L308 182" class="guide"/>
  <path d="M280 142 L280 162 L344 162 L344 182" class="guide"/>
  <path d="M460 142 L460 162 L392 162 L392 182" class="guide"/>
  <path d="M640 142 L640 160 L428 160 L428 182" class="guide"/>
  <path d="M478 223 L520 223" class="arrow"/>
  <path d="M640 202 L668 190" class="arrow"/>
  <path d="M640 246 L668 244" class="arrow"/>
</svg>
