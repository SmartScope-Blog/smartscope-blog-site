<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="640" height="420" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="320" y="32" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5">FIG 1 — 三角関係</text>

  <!-- Triangle edges (dashed) -->
  <line x1="320" y1="100" x2="135" y2="310" stroke="#f0883e" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>
  <line x1="320" y1="100" x2="505" y2="310" stroke="#3fb950" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>
  <line x1="160" y1="335" x2="480" y2="335" stroke="#58a6ff" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- Edge labels -->
  <text x="200" y="195" fill="#f0883e" font-size="11" opacity="0.7" transform="rotate(-39, 200, 195)">利益への期待</text>
  <text x="425" y="195" fill="#3fb950" font-size="11" opacity="0.7" transform="rotate(39, 425, 195)">資本効率</text>
  <text x="320" y="368" fill="#8b949e" font-size="11" text-anchor="middle">PER × ROE = PBR</text>

  <!-- Node: PBR (top) -->
  <circle cx="320" cy="85" r="36" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="320" y="82" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700">PBR</text>
  <text x="320" y="97" text-anchor="middle" fill="#8b949e" font-size="9">株価 ÷ BPS</text>
  <text x="320" y="135" text-anchor="middle" fill="#8b949e" font-size="10">資産から見た評価</text>

  <!-- Node: PER (bottom-left) -->
  <circle cx="130" cy="320" r="36" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="130" y="317" text-anchor="middle" fill="#f0883e" font-size="18" font-weight="700">PER</text>
  <text x="130" y="332" text-anchor="middle" fill="#8b949e" font-size="9">株価 ÷ EPS</text>
  <text x="130" y="385" text-anchor="middle" fill="#8b949e" font-size="10">利益から見た期待</text>

  <!-- Node: ROE (bottom-right) -->
  <circle cx="510" cy="320" r="36" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="510" y="317" text-anchor="middle" fill="#3fb950" font-size="18" font-weight="700">ROE</text>
  <text x="510" y="332" text-anchor="middle" fill="#8b949e" font-size="9">EPS ÷ BPS</text>
  <text x="510" y="385" text-anchor="middle" fill="#8b949e" font-size="10">株主資本の効率</text>
</svg>
