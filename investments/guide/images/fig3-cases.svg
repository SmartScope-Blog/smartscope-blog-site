<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="640" height="480" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="1.5">FIG 3 — PBR 1倍割れの4パターン</text>

  <!-- Card 1: Structural (top-left) -->
  <rect x="20" y="48" width="290" height="185" fill="#161b22" stroke="#30363d" rx="8"/>
  <!-- Tag -->
  <rect x="210" y="56" width="90" height="18" fill="#6e768120" rx="4"/>
  <text x="255" y="68" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">構造的 1倍割れ</text>
  <!-- Title -->
  <text x="36" y="74" fill="#e6edf3" font-size="13" font-weight="600">低期待 × 低効率</text>
  <!-- Metrics -->
  <text x="36" y="100" fill="#f0883e" font-size="12">PER 12</text>
  <text x="110" y="100" fill="#3fb950" font-size="12">ROE 4%</text>
  <text x="190" y="100" fill="#58a6ff" font-size="13" font-weight="700">PBR 0.48</text>
  <!-- Bar -->
  <rect x="36" y="112" width="258" height="8" fill="#21262d" rx="4"/>
  <rect x="36" y="112" width="62" height="8" fill="#6e7681" rx="4"/>
  <!-- PBR scale markers -->
  <line x1="165" y1="112" x2="165" y2="120" stroke="#58a6ff" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <text x="165" y="131" text-anchor="middle" fill="#58a6ff" font-size="11" opacity="0.5">1.0x</text>
  <!-- Description -->
  <text x="36" y="152" fill="#8b949e" font-size="11">稼ぐ力が低く、市場も期待していない。</text>
  <text x="36" y="168" fill="#8b949e" font-size="11">改善施策がなければ万年割安。</text>

  <!-- Card 2: Fair (top-right) -->
  <rect x="330" y="48" width="290" height="185" fill="#161b22" stroke="#30363d" rx="8"/>
  <rect x="545" y="56" width="65" height="18" fill="#f0883e20" rx="4"/>
  <text x="577" y="68" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">ほぼ妥当</text>
  <text x="346" y="74" fill="#e6edf3" font-size="13" font-weight="600">普通期待 × 低効率</text>
  <text x="346" y="100" fill="#f0883e" font-size="12">PER 15</text>
  <text x="420" y="100" fill="#3fb950" font-size="12">ROE 6%</text>
  <text x="500" y="100" fill="#58a6ff" font-size="13" font-weight="700">PBR 0.90</text>
  <rect x="346" y="112" width="258" height="8" fill="#21262d" rx="4"/>
  <rect x="346" y="112" width="116" height="8" fill="#f0883e" rx="4" opacity="0.8"/>
  <line x1="475" y1="112" x2="475" y2="120" stroke="#58a6ff" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <text x="475" y="131" text-anchor="middle" fill="#58a6ff" font-size="11" opacity="0.5">1.0x</text>
  <text x="346" y="152" fill="#8b949e" font-size="11">期待は平均的だが、資本効率が</text>
  <text x="346" y="168" fill="#8b949e" font-size="11">資本コストに届いていない。</text>

  <!-- Card 3: Growth (bottom-left) -->
  <rect x="20" y="250" width="290" height="185" fill="#161b22" stroke="#30363d" rx="8"/>
  <rect x="190" y="258" width="110" height="18" fill="#58a6ff20" rx="4"/>
  <text x="245" y="270" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">成長プレミアム</text>
  <text x="36" y="276" fill="#e6edf3" font-size="13" font-weight="600">高期待 × 高効率</text>
  <text x="36" y="302" fill="#f0883e" font-size="12">PER 25</text>
  <text x="110" y="302" fill="#3fb950" font-size="12">ROE 12%</text>
  <text x="195" y="302" fill="#58a6ff" font-size="13" font-weight="700">PBR 3.00</text>
  <rect x="36" y="314" width="258" height="8" fill="#21262d" rx="4"/>
  <rect x="36" y="314" width="258" height="8" fill="#58a6ff" rx="4" opacity="0.7"/>
  <line x1="122" y1="314" x2="122" y2="322" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <text x="122" y="333" text-anchor="middle" fill="#ffffff" font-size="11" opacity="0.5">1.0x</text>
  <text x="36" y="354" fill="#8b949e" font-size="11">高効率で回し、市場もさらなる成長を</text>
  <text x="36" y="370" fill="#8b949e" font-size="11">織り込んでいる状態。</text>

  <!-- Card 4: Opportunity (bottom-right) - highlighted -->
  <rect x="330" y="250" width="290" height="185" fill="#161b22" stroke="#3fb950" stroke-width="2" rx="8"/>
  <rect x="530" y="258" width="80" height="18" fill="#3fb95020" rx="4"/>
  <text x="570" y="270" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">割安候補 ✓</text>
  <text x="346" y="276" fill="#e6edf3" font-size="13" font-weight="600">低期待 × 高効率</text>
  <text x="346" y="302" fill="#f0883e" font-size="12">PER 8</text>
  <text x="418" y="302" fill="#3fb950" font-size="12">ROE 10%</text>
  <text x="498" y="302" fill="#58a6ff" font-size="13" font-weight="700">PBR 0.80</text>
  <rect x="346" y="314" width="258" height="8" fill="#21262d" rx="4"/>
  <rect x="346" y="314" width="103" height="8" fill="#3fb950" rx="4" opacity="0.8"/>
  <line x1="475" y1="314" x2="475" y2="322" stroke="#58a6ff" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <text x="475" y="333" text-anchor="middle" fill="#58a6ff" font-size="11" opacity="0.5">1.0x</text>
  <text x="346" y="354" fill="#8b949e" font-size="11">稼ぐ力はあるのに市場が過小評価。</text>
  <text x="346" y="370" fill="#8b949e" font-size="11">悲観解消の触媒があるかが鍵。</text>

  <!-- Legend at bottom -->
  <text x="320" y="460" text-anchor="middle" fill="#6e7681" font-size="11">バーの破線 = PBR 1.0倍ライン｜バー長 = PBR水準（右端 ≈ 3.0倍）</text>
</svg>
