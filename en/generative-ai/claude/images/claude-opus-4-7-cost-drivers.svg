<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" width="980" height="500" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="700" role="img" aria-labelledby="title desc">
  <title id="title">Three reasons Claude Opus 4.7 can feel more expensive</title>
  <desc id="desc">Three drivers of higher effective cost in Claude Opus 4.7: tokenizer, higher-resolution vision, and xhigh effort.</desc>

  <rect x="24" y="20" width="932" height="460" rx="18" fill="#F6F3EC" stroke="#C7C0B1"/>
  <text x="490" y="56" text-anchor="middle" fill="#33312D" font-size="24" font-weight="700">Three Reasons Opus 4.7 Can Feel Heavier</text>
  <text x="490" y="84" text-anchor="middle" fill="#5F5E5A" font-size="14">List prices stay fixed, but token growth no longer matches 4.6 one-for-one.</text>

  <rect x="52" y="126" width="276" height="252" rx="18" fill="#E8F1FB" stroke="#378ADD" stroke-width="2.2"/>
  <text x="78" y="160" fill="#1F5C94" font-size="14" font-weight="700">1. Tokenizer</text>
  <text x="78" y="198" fill="#1F5C94" font-size="34" font-weight="700">1.00x - 1.35x</text>
  <text x="78" y="226" fill="#5F5E5A" font-size="12">The same content can expand in token count.</text>
  <rect x="78" y="252" width="208" height="16" rx="8" fill="#D7E7FA"/>
  <rect x="78" y="252" width="208" height="16" rx="8" fill="#378ADD" opacity="0.25"/>
  <text x="78" y="292" fill="#5F5E5A" font-size="12">Re-run `count_tokens` and any</text>
  <text x="78" y="310" fill="#5F5E5A" font-size="12">client-side estimates before using old budgets.</text>

  <rect x="352" y="126" width="276" height="252" rx="18" fill="#FFF0D7" stroke="#D9991B" stroke-width="2.2"/>
  <text x="378" y="160" fill="#9A6200" font-size="14" font-weight="700">2. Vision</text>
  <text x="378" y="198" fill="#9A6200" font-size="24" font-weight="700">1,568px → 2,576px</text>
  <text x="378" y="226" fill="#5F5E5A" font-size="11">Higher-resolution parsing now</text>
  <text x="378" y="242" fill="#5F5E5A" font-size="11">turns on automatically.</text>
  <rect x="378" y="262" width="70" height="14" rx="7" fill="#CFC8BC"/>
  <rect x="378" y="290" width="210" height="14" rx="7" fill="#D9991B"/>
  <text x="460" y="273" fill="#5F5E5A" font-size="11">Old: max about 1,600 tokens</text>
  <text x="596" y="301" text-anchor="end" fill="#9A6200" font-size="11" font-weight="700">New: max about 4,784 tokens</text>
  <text x="378" y="328" fill="#5F5E5A" font-size="11">UI and chart reading improve, but</text>
  <text x="378" y="344" fill="#5F5E5A" font-size="11">image-heavy workflows get heavier</text>
  <text x="378" y="360" fill="#5F5E5A" font-size="11">immediately.</text>

  <rect x="652" y="126" width="276" height="252" rx="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2.2"/>
  <text x="678" y="160" fill="#A6431F" font-size="14" font-weight="700">3. Effort</text>
  <text x="678" y="198" fill="#A6431F" font-size="22" font-weight="700">xhigh Added</text>
  <text x="678" y="226" fill="#5F5E5A" font-size="11">A new depth tier now sits</text>
  <text x="678" y="242" fill="#5F5E5A" font-size="11">between high and max.</text>
  <rect x="678" y="258" width="42" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <rect x="726" y="258" width="54" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <rect x="786" y="258" width="62" height="28" rx="8" fill="#FDE0D6" stroke="#D85A30"/>
  <rect x="854" y="258" width="46" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <text x="699" y="276" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">high</text>
  <text x="753" y="276" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">xhigh</text>
  <text x="817" y="276" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">NEW</text>
  <text x="877" y="276" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">max</text>
  <text x="678" y="312" fill="#5F5E5A" font-size="11">Recommended for coding</text>
  <text x="678" y="327" fill="#5F5E5A" font-size="11">and agentic tasks.</text>
  <text x="678" y="345" fill="#5F5E5A" font-size="11">Later turns can grow in both</text>
  <text x="678" y="360" fill="#5F5E5A" font-size="11">thinking and output.</text>

  <rect x="122" y="426" width="736" height="28" rx="14" fill="#FFFFFF" stroke="#C7C0B1"/>
  <text x="490" y="445" text-anchor="middle" fill="#33312D" font-size="13" font-weight="700">The 4.7 cost story is less "higher price" and more "the same work can consume more tokens."</text>
</svg>
