<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="840" height="420" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Four-step /team-onboarding loop for team rollout</title>
  <desc id="desc">Diagram showing a loop of running /team-onboarding, cleaning the output, sharing it with new teammates, and feeding lessons back into project assets</desc>

  <defs>
    <marker id="arrowb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="840" height="420" fill="#ffffff"/>
  <text x="420" y="34" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#1f2937">A Four-Step /team-onboarding Loop</text>
  <text x="420" y="60" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#475569">Treat it as a feedback loop that grows team assets, not as a one-shot document generator</text>

  <rect x="60" y="110" width="160" height="96" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="140" y="140" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#9a3412">1. Run</text>
  <text x="140" y="164" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c2d12">Use it in a mature repo</text>
  <text x="140" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c2d12">with real usage history</text>

  <rect x="250" y="110" width="160" height="96" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="140" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">2. Clean</text>
  <text x="330" y="164" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Remove local noise</text>
  <text x="330" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Promote stable rules</text>

  <rect x="440" y="110" width="160" height="96" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="520" y="140" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#047857">3. Share</text>
  <text x="520" y="164" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">Give the cleaned guide</text>
  <text x="520" y="182" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#334155">to new teammates</text>

  <rect x="620" y="110" width="170" height="96" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="710" y="140" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#6d28d9">4. Feed Back</text>
  <text x="705" y="164" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">Turn friction points into</text>
  <text x="705" y="181" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">CLAUDE.md and settings</text>
  <text x="705" y="198" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#334155">updates</text>

  <line x1="220" y1="158" x2="250" y2="158" stroke="#334155" stroke-width="2" marker-end="url(#arrowb)"/>
  <line x1="410" y1="158" x2="440" y2="158" stroke="#334155" stroke-width="2" marker-end="url(#arrowb)"/>
  <line x1="600" y1="158" x2="620" y2="158" stroke="#334155" stroke-width="2" marker-end="url(#arrowb)"/>

  <path d="M710 206 C710 280 520 304 330 304 C170 304 94 272 94 214" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrowb)"/>
  <text x="414" y="326" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155">As the loop repeats, onboarding shifts from personal know-how to shared team infrastructure</text>

  <rect x="160" y="350" width="520" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="420" y="376" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334155">Key point: use /team-onboarding as an intake path for stronger project assets</text>
</svg>
