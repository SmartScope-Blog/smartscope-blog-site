<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" width="620" height="460" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Many Brains, Many Hands: Scaling Configuration</title>
  <desc id="desc">Multiple brains share multiple hands in a many-to-many configuration with hand passing between brains</desc>

  <text x="310" y="28" text-anchor="middle" fill="#5F5E5A" font-size="15" font-weight="700">Same interfaces → many-to-many horizontal scaling</text>

  <g>
    <rect x="110" y="60" width="180" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="200" y="88" text-anchor="middle" fill="#463F9F" font-size="13" font-weight="700">Brain A</text>
    <text x="200" y="108" text-anchor="middle" fill="#463F9F" font-size="10" opacity="0.85">Claude Code harness</text>
    <text x="200" y="124" text-anchor="middle" fill="#463F9F" font-size="10" opacity="0.85">holds session X</text>
  </g>
  <g>
    <rect x="330" y="60" width="180" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="420" y="88" text-anchor="middle" fill="#463F9F" font-size="13" font-weight="700">Brain B</text>
    <text x="420" y="108" text-anchor="middle" fill="#463F9F" font-size="10" opacity="0.85">Task-specific harness</text>
    <text x="420" y="124" text-anchor="middle" fill="#463F9F" font-size="10" opacity="0.85">holds session Y</text>
  </g>

  <line x1="290" y1="100" x2="330" y2="100" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrSm)"/>
  <text x="310" y="54" text-anchor="middle" fill="#5F5E5A" font-size="10" opacity="0.9">Hand passing (same execute IF)</text>

  <g stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arr3)">
    <path d="M170,142 L110,260"/>
    <path d="M230,142 L310,260"/>
    <path d="M390,142 L310,260"/>
    <path d="M450,142 L510,260"/>
  </g>

  <g>
    <rect x="40" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="110" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">Hand 1</text>
    <text x="110" y="312" text-anchor="middle" fill="#0F6E56" font-size="10">Container</text>
    <text x="110" y="328" text-anchor="middle" fill="#0F6E56" font-size="10" opacity="0.85">execute()</text>
  </g>
  <g>
    <rect x="240" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="310" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">Hand 2</text>
    <text x="310" y="312" text-anchor="middle" fill="#0F6E56" font-size="10">MCP Server</text>
    <text x="310" y="328" text-anchor="middle" fill="#0F6E56" font-size="10" opacity="0.85">execute()</text>
  </g>
  <g>
    <rect x="440" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="510" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">Hand 3</text>
    <text x="510" y="312" text-anchor="middle" fill="#0F6E56" font-size="10">Customer VPC</text>
    <text x="510" y="328" text-anchor="middle" fill="#0F6E56" font-size="10" opacity="0.85">execute()</text>
  </g>

  <text x="310" y="380" text-anchor="middle" fill="#463F9F" font-size="13">Harness is stateless → horizontally scalable</text>
  <text x="310" y="398" text-anchor="middle" fill="#0F6E56" font-size="13">Hands share execute() IF → container, MCP, or VPC all the same</text>
  <text x="310" y="424" text-anchor="middle" fill="#5F5E5A" font-size="14" font-weight="700">TTFT: p50 ~60% reduction, p95 90%+ reduction (no waiting for container boot)</text>

  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#888780" stroke-width="1"/>
    </marker>
    <marker id="arrSm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#5F5E5A" stroke-width="1"/>
    </marker>
  </defs>
</svg>
