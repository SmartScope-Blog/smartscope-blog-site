<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Feedback Speed Hierarchy</title>
  <desc id="desc">Four layers in increasing time scale: PostToolUse Hook (ms), pre-commit hook (sec), CI (min), human review (hours-days). Faster layers enable better self-correction</desc>

  <!-- Title -->
  <text x="20" y="24" fill="#2C2C2A" font-size="14" font-weight="700">Feedback Speed Hierarchy</text>

  <!-- Speed axis labels -->
  <text x="20" y="44" fill="#1D9E75" font-size="11" font-weight="700">&lt;- Fast (mechanically enforced)</text>
  <text x="780" y="44" text-anchor="end" fill="#5F5E5A" font-size="11" font-weight="700">Slow (human) -&gt;</text>

  <!-- Row 1: PostToolUse Hook (ms) -->
  <rect x="160" y="56" width="80" height="26" rx="4" fill="#0E5A40"/>
  <text x="164" y="74" fill="#FFFFFF" font-size="11" font-weight="700">ms</text>
  <text x="20" y="74" fill="#0E5A40" font-size="11" font-weight="700">PostToolUse Hook</text>
  <text x="250" y="74" fill="#5F5E5A" font-size="11">settings.json PostToolUse</text>

  <!-- Row 2: Pre-commit (sec) -->
  <rect x="160" y="92" width="160" height="26" rx="4" fill="#1D9E75"/>
  <text x="164" y="110" fill="#FFFFFF" font-size="11" font-weight="700">sec</text>
  <text x="20" y="110" fill="#1D9E75" font-size="11" font-weight="700">Pre-commit hook</text>
  <text x="330" y="110" fill="#5F5E5A" font-size="11">git pre-commit hook</text>

  <!-- Row 3: CI (min) -->
  <rect x="160" y="128" width="320" height="26" rx="4" fill="#185FA5"/>
  <text x="164" y="146" fill="#FFFFFF" font-size="11" font-weight="700">min</text>
  <text x="20" y="146" fill="#185FA5" font-size="11" font-weight="700">CI</text>
  <text x="490" y="146" fill="#5F5E5A" font-size="11">GitHub Actions</text>

  <!-- Row 4: Human review (hours - days) -->
  <rect x="160" y="164" width="540" height="26" rx="4" fill="#6E6D68"/>
  <text x="164" y="182" fill="#FFFFFF" font-size="11" font-weight="700">hours - days</text>
  <text x="20" y="182" fill="#3F3E3B" font-size="11" font-weight="700">Human review</text>
  <text x="710" y="182" fill="#5F5E5A" font-size="11">PR review</text>

  <!-- Caption -->
  <text x="20" y="216" fill="#5F5E5A" font-size="11">The further left, the more mechanically enforceable. "Run the linter" via Hook means "every time without exception"; the same instruction in CLAUDE.md means "almost every time."</text>
</svg>
