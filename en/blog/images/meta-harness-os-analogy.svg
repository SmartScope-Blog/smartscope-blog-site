<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="680" height="620" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Managed Agents as a Meta-Harness: OS Analogy</title>
  <desc id="desc">Top: OS abstraction (apps → read/write → diverse storage). Bottom: Managed Agents (multiple harnesses → unified IF → diverse hands and sessions)</desc>

  <!-- Top: OS analogy -->
  <rect x="20" y="30" width="640" height="230" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="1.8"/>
  <text x="40" y="56" fill="#5F5E5A" font-size="15" font-weight="700">Top: OS Abstraction (Reference)</text>
  <text x="40" y="74" fill="#5F5E5A" font-size="11" opacity="0.85">Stable interface → hardware free to evolve</text>

  <g>
    <rect x="50"  y="92" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#888780"/>
    <text x="110" y="120" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">App A</text>
    <rect x="180" y="92" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#888780"/>
    <text x="240" y="120" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">App B</text>
    <rect x="310" y="92" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#888780" stroke-dasharray="3 3"/>
    <text x="370" y="120" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">Unknown App</text>
  </g>

  <line x1="220" y1="140" x2="220" y2="162" stroke="#888780" stroke-width="1" marker-end="url(#arrM)"/>
  <text x="440" y="122" fill="#5F5E5A" font-size="11" font-family="monospace">read() / write()</text>

  <rect x="50" y="168" width="380" height="30" rx="6" fill="#FFFFFF" stroke="#888780" stroke-width="1.2"/>
  <text x="240" y="188" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">Unified Interface (POSIX etc.)</text>

  <line x1="140" y1="200" x2="140" y2="220" stroke="#888780" stroke-width="1" marker-end="url(#arrM)"/>
  <line x1="240" y1="200" x2="240" y2="220" stroke="#888780" stroke-width="1" marker-end="url(#arrM)"/>
  <line x1="340" y1="200" x2="340" y2="220" stroke="#888780" stroke-width="1" marker-end="url(#arrM)"/>

  <rect x="60"  y="224" width="120" height="28" rx="5" fill="#FFFFFF" stroke="#888780"/><text x="120" y="244" text-anchor="middle" fill="#5F5E5A" font-size="10">Disk Pack</text>
  <rect x="190" y="224" width="120" height="28" rx="5" fill="#FFFFFF" stroke="#888780"/><text x="250" y="244" text-anchor="middle" fill="#5F5E5A" font-size="10">SSD</text>
  <rect x="320" y="224" width="120" height="28" rx="5" fill="#FFFFFF" stroke="#888780"/><text x="380" y="244" text-anchor="middle" fill="#5F5E5A" font-size="10">NVMe / Unknown</text>

  <!-- Structural similarity box -->
  <g transform="translate(460, 130)">
    <rect x="0" y="0" width="180" height="100" rx="10" fill="#FFFFFF" stroke="#888780" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="90" y="24" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">Structural Similarity</text>
    <text x="90" y="46" text-anchor="middle" fill="#5F5E5A" font-size="10">Apps → Harnesses</text>
    <text x="90" y="64" text-anchor="middle" fill="#5F5E5A" font-size="10">POSIX IF → execute etc.</text>
    <text x="90" y="82" text-anchor="middle" fill="#5F5E5A" font-size="10">Hardware → Hands / Sessions</text>
  </g>

  <line x1="340" y1="266" x2="340" y2="290" stroke="#888780" stroke-width="1.4" marker-end="url(#arrM)"/>

  <!-- Bottom: Managed Agents -->
  <rect x="20" y="298" width="640" height="302" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="2.5"/>
  <text x="40" y="324" fill="#1F5C94" font-size="15" font-weight="700">Bottom: Managed Agents (The Meta-Harness Layer)</text>
  <text x="40" y="342" fill="#1F5C94" font-size="13" opacity="0.9">Not a specific harness — a platform that hosts many</text>

  <g>
    <rect x="40"  y="358" width="170" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="125" y="380" text-anchor="middle" fill="#463F9F" font-size="11" font-weight="700">Claude Code</text>
    <text x="125" y="398" text-anchor="middle" fill="#463F9F" font-size="10">(one harness example)</text>
  </g>
  <g>
    <rect x="220" y="358" width="210" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="325" y="380" text-anchor="middle" fill="#463F9F" font-size="11" font-weight="700">Task-Specific Harness A</text>
    <text x="325" y="398" text-anchor="middle" fill="#463F9F" font-size="10">(different implementation)</text>
  </g>
  <g>
    <rect x="440" y="358" width="200" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8" stroke-dasharray="4 3"/>
    <text x="540" y="380" text-anchor="middle" fill="#463F9F" font-size="11" font-weight="700">Future Harness</text>
    <text x="540" y="398" text-anchor="middle" fill="#463F9F" font-size="10">(doesn't exist yet)</text>
  </g>

  <line x1="125" y1="416" x2="125" y2="442" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="325" y1="416" x2="325" y2="442" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="540" y1="416" x2="540" y2="442" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>

  <rect x="40" y="448" width="600" height="30" rx="6" fill="#FFFFFF" stroke="#378ADD" stroke-width="1.5"/>
  <text x="340" y="468" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700" font-family="monospace">execute()  /  getEvents()  /  emitEvent()  /  provision()  /  wake()</text>

  <line x1="160" y1="478" x2="160" y2="498" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="340" y1="478" x2="340" y2="498" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>
  <line x1="520" y1="478" x2="520" y2="498" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrB)"/>

  <rect x="40"  y="502" width="240" height="54" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="160" y="524" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Hands</text>
  <text x="160" y="542" text-anchor="middle" fill="#0F6E56" font-size="10">Container / MCP / VPC</text>

  <rect x="290" y="502" width="350" height="54" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
  <text x="465" y="524" text-anchor="middle" fill="#8A5210" font-size="11" font-weight="700">Session (Durable Log)</text>
  <text x="465" y="542" text-anchor="middle" fill="#8A5210" font-size="10">Shared and resumable across harnesses</text>

  <text x="340" y="582" text-anchor="middle" fill="#1F5C94" font-size="14" font-weight="700">Harness implementations rot. Interfaces endure.</text>

  <defs>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#888780" stroke-width="1"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#378ADD" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
