<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Three-layer professional model for the AI era</title>
  <desc id="desc">A three-layer model: use tools, build harnesses, and design organizations.</desc>
  <rect width="800" height="520" fill="#ffffff"/>
  <text x="400" y="42" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#12343b">Three-Layer Professional Model</text>
  <text x="400" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4b5563">The higher the layer, the more value survives tool and company changes</text>

  <path d="M210 398 L590 398 L540 474 L260 474 Z" fill="#d9f0f2" stroke="#2f7c85" stroke-width="2"/>
  <text x="400" y="427" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#12343b">Use Tools</text>
  <text x="400" y="456" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#12343b">Prompt / Context / IDE support</text>

  <path d="M170 270 L630 270 L590 360 L210 360 Z" fill="#bfe4d1" stroke="#2f7c5f" stroke-width="2"/>
  <text x="400" y="303" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#12343b">Build Harnesses</text>
  <text x="400" y="332" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#12343b">Test / Guardrail / Eval</text>

  <path d="M120 122 L680 122 L630 232 L170 232 Z" fill="#ffe0a8" stroke="#b56b00" stroke-width="2"/>
  <text x="400" y="160" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#3b2a12">Design Organizations</text>
  <text x="400" y="190" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#3b2a12">Observe work / Draw boundaries / Scale rollout</text>

  <line x1="705" y1="420" x2="705" y2="150" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="727" y="295" transform="rotate(90 727 295)" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#111827">Portability</text>

  <line x1="320" y1="118" x2="220" y2="82" stroke="#b56b00" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="118" x2="400" y2="82" stroke="#b56b00" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="118" x2="580" y2="82" stroke="#b56b00" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="50" width="100" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="350" y="50" width="100" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="530" y="50" width="100" height="32" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="220" y="71" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#111827">Company A</text>
  <text x="400" y="71" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#111827">Company B</text>
  <text x="580" y="71" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#111827">Company C</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>
</svg>
