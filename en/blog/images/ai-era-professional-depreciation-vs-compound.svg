<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc">
  <title id="title">Tool depreciation versus skill compounding</title>
  <desc id="desc">A comparison between changing tool versions and accumulating organizational skill.</desc>
  <rect width="800" height="360" fill="#ffffff"/>
  <text x="400" y="38" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#12343b">Tool Depreciation vs Skill Compounding</text>
  <line x1="70" y1="290" x2="350" y2="290" stroke="#111827" stroke-width="2"/>
  <line x1="70" y1="290" x2="70" y2="80" stroke="#111827" stroke-width="2"/>
  <text x="210" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#12343b">Tool Layer</text>
  <text x="210" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4b5563">Claude Code v1 -> v2 -> v3</text>
  <path d="M80 110 C130 118, 155 170, 172 240" fill="none" stroke="#2f7c85" stroke-width="4"/>
  <path d="M172 110 C220 118, 246 170, 263 240" fill="none" stroke="#2f7c85" stroke-width="4" stroke-dasharray="8 6"/>
  <path d="M263 110 C298 125, 318 175, 335 240" fill="none" stroke="#2f7c85" stroke-width="4" stroke-dasharray="3 6"/>
  <text x="124" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#12343b">v1</text>
  <text x="216" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#12343b">v2</text>
  <text x="303" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#12343b">v3</text>
  <text x="210" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4b5563">Operating tricks lose value as versions change</text>

  <line x1="450" y1="290" x2="730" y2="290" stroke="#111827" stroke-width="2"/>
  <line x1="450" y1="290" x2="450" y2="80" stroke="#111827" stroke-width="2"/>
  <text x="590" y="330" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#3b2a12">Skill Layer</text>
  <text x="590" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4b5563">Workflow reading and boundary design</text>
  <path d="M462 270 C520 250, 555 218, 590 175 C625 132, 670 105, 720 92" fill="none" stroke="#b56b00" stroke-width="5"/>
  <circle cx="462" cy="270" r="5" fill="#b56b00"/>
  <circle cx="590" cy="175" r="5" fill="#b56b00"/>
  <circle cx="720" cy="92" r="5" fill="#b56b00"/>
  <text x="590" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4b5563">Experience transfers across organizations</text>
</svg>
