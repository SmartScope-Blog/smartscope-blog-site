<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="680" height="680" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Credential Isolation Patterns: Old Threat vs New Design</title>
  <desc id="desc">Top: old design where prompt injection leads to token theft and session hijacking. Bottom: new Git-based and MCP-based isolation patterns</desc>

  <!-- Top: Old threat -->
  <rect x="20" y="30" width="640" height="246" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="2"/>
  <text x="40" y="56" fill="#A6431F" font-size="15" font-weight="700">Old Design Threat: Token Theft → Session Hijacking</text>

  <g>
    <rect x="40"  y="78" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
    <text x="105" y="98" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">Prompt</text>
    <text x="105" y="116" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">Injection</text>
  </g>
  <line x1="172" y1="103" x2="205" y2="103" stroke="#A6431F" stroke-width="1.2" marker-end="url(#arrR)"/>
  <g>
    <rect x="207" y="78" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
    <text x="272" y="98" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">Claude reads</text>
    <text x="272" y="116" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">env variables</text>
  </g>
  <line x1="339" y1="103" x2="372" y2="103" stroke="#A6431F" stroke-width="1.2" marker-end="url(#arrR)"/>
  <g>
    <rect x="374" y="78" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
    <text x="439" y="98" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">Attacker</text>
    <text x="439" y="116" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">gets token</text>
  </g>
  <line x1="506" y1="103" x2="538" y2="103" stroke="#A6431F" stroke-width="1.2" marker-end="url(#arrR)"/>
  <g>
    <rect x="540" y="78" width="110" height="50" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1.8"/>
    <text x="595" y="98" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">Spawns new</text>
    <text x="595" y="116" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">session</text>
  </g>

  <text x="40" y="160" fill="#A6431F" font-size="13" font-weight="700">→ Attacker can delegate work to fresh, unrestricted sessions</text>
  <text x="40" y="178" fill="#A6431F" font-size="12" font-weight="700">Scope limits based on "Claude can't do much" stop holding</text>
  <text x="40" y="198" fill="#A6431F" font-size="11" opacity="0.9">As models get smarter, this assumption breaks — one token enables arbitrary downstream ops</text>

  <rect x="40" y="214" width="610" height="48" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text x="60" y="234" fill="#A6431F" font-size="11" font-weight="700">Not just a token leak:</text>
  <text x="60" y="252" fill="#A6431F" font-size="11">The attacker can spawn <tspan font-style="italic">a whole new agent</tspan> — that's the real threat</text>

  <line x1="20" y1="302" x2="660" y2="302" stroke="#888780" stroke-width="1"/>
  <text x="340" y="320" text-anchor="middle" fill="#5F5E5A" font-size="14" font-weight="700">New Design: Credentials isolated from both sandbox AND harness</text>

  <!-- Pattern 1: Git -->
  <rect x="20" y="336" width="310" height="314" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="175" y="362" text-anchor="middle" fill="#0F6E56" font-size="14" font-weight="700">Pattern 1: Git-Based</text>

  <rect x="40" y="378" width="270" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="175" y="398" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">Vault (repo access token)</text>
  <text x="175" y="414" text-anchor="middle" fill="#5F5E5A" font-size="11">Invisible to harness and Claude</text>

  <line x1="175" y1="424" x2="175" y2="448" stroke="#888780" stroke-width="1" marker-end="url(#arrD)"/>

  <rect x="40" y="454" width="270" height="52" rx="6" fill="#FFFFFF" stroke="#1D9E75"/>
  <text x="175" y="474" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Cloned at init time</text>
  <text x="175" y="494" text-anchor="middle" fill="#0F6E56" font-size="11">Token baked into remote URL</text>

  <line x1="175" y1="510" x2="175" y2="532" stroke="#888780" stroke-width="1" marker-end="url(#arrD)"/>

  <rect x="40" y="538" width="270" height="52" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="175" y="558" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Inside sandbox</text>
  <text x="175" y="578" text-anchor="middle" fill="#0F6E56" font-size="11">git push / pull just works</text>

  <text x="175" y="614" text-anchor="middle" fill="#0F6E56" font-size="13" font-weight="700">Neither agent nor harness</text>
  <text x="175" y="632" text-anchor="middle" fill="#0F6E56" font-size="13" font-weight="700">ever touches the token</text>
  <text x="175" y="648" text-anchor="middle" fill="#0F6E56" font-size="11" opacity="0.85">(doesn't even know it exists)</text>

  <!-- Pattern 2: MCP -->
  <rect x="350" y="336" width="310" height="314" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="2"/>
  <text x="505" y="362" text-anchor="middle" fill="#1F5C94" font-size="14" font-weight="700">Pattern 2: MCP-Based</text>

  <rect x="370" y="378" width="270" height="40" rx="6" fill="#EEEDFE" stroke="#7F77DD"/>
  <text x="505" y="402" text-anchor="middle" fill="#463F9F" font-size="11" font-weight="700">Claude (holds session token only)</text>

  <line x1="505" y1="420" x2="505" y2="440" stroke="#888780" stroke-width="1" marker-end="url(#arrD)"/>

  <rect x="370" y="444" width="270" height="52" rx="6" fill="#FFFFFF" stroke="#378ADD"/>
  <text x="505" y="464" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">MCP Proxy</text>
  <text x="505" y="484" text-anchor="middle" fill="#1F5C94" font-size="11">Receives session token</text>

  <line x1="505" y1="500" x2="505" y2="522" stroke="#888780" stroke-width="1" marker-end="url(#arrD)"/>

  <rect x="370" y="528" width="270" height="44" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="505" y="548" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="700">Vault (OAuth credentials)</text>
  <text x="505" y="564" text-anchor="middle" fill="#5F5E5A" font-size="11">Only proxy can access</text>

  <line x1="505" y1="576" x2="505" y2="598" stroke="#888780" stroke-width="1" marker-end="url(#arrD)"/>

  <rect x="370" y="604" width="270" height="36" rx="6" fill="#FFFFFF" stroke="#378ADD"/>
  <text x="505" y="627" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">Calls external service</text>

  <text x="505" y="648" text-anchor="middle" fill="#1F5C94" font-size="13" font-weight="700">Harness never sees credentials</text>

  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#A6431F" stroke-width="1.2"/>
    </marker>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#888780" stroke-width="1"/>
    </marker>
  </defs>
</svg>
