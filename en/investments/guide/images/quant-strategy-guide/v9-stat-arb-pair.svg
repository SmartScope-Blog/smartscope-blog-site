<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Statistical Arbitrage Concept</title>
  <desc id="desc">Two similar stocks diverge temporarily and then converge again.</desc>
  <style>
    .title { font: 700 26px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .axis { stroke: #888780; stroke-width: 1.5; }
    .grid { stroke: #ecebe6; stroke-width: 1; }
    .lineA { fill: none; stroke: #378add; stroke-width: 4; stroke-linecap: round; }
    .lineB { fill: none; stroke: #1d9e75; stroke-width: 4; stroke-linecap: round; }
    .label { font: 13px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #4f4f49; }
    .note { fill: #f7f7f5; stroke: #d8d7d2; stroke-width: 1.2; }
    .sell { fill: #fdf0ec; stroke: #e24b4a; stroke-width: 1.2; }
    .buy { fill: #effaf6; stroke: #1d9e75; stroke-width: 1.2; }
  </style>
  <rect width="920" height="360" fill="#ffffff" rx="28"/>
  <text x="36" y="38" class="title">Statistical Arbitrage: Trade the Gap</text>
  <g transform="translate(60 70)">
    <line x1="0" y1="0" x2="0" y2="220" class="axis"/>
    <line x1="0" y1="220" x2="620" y2="220" class="axis"/>
    <line x1="0" y1="55" x2="620" y2="55" class="grid"/>
    <line x1="0" y1="110" x2="620" y2="110" class="grid"/>
    <line x1="0" y1="165" x2="620" y2="165" class="grid"/>
    <polyline class="lineA" points="0,150 60,142 120,132 180,122 240,110 300,90 360,84 420,96 480,108 540,118 600,126"/>
    <polyline class="lineB" points="0,154 60,146 120,136 180,126 240,116 300,134 360,148 420,122 480,112 540,120 600,128"/>

    <rect x="254" y="26" width="116" height="34" rx="17" class="sell"/>
    <text x="312" y="48" text-anchor="middle" class="label">Short the rich one</text>
    <rect x="254" y="178" width="116" height="34" rx="17" class="buy"/>
    <text x="312" y="200" text-anchor="middle" class="label">Buy the cheap one</text>

    <text x="10" y="238" class="label">Time</text>
    <text x="-12" y="12" class="label">Price</text>
  </g>

  <rect x="720" y="92" width="160" height="40" rx="14" class="note"/>
  <line x1="740" y1="112" x2="780" y2="112" class="lineA"/>
  <text x="796" y="117" class="label">Stock A</text>
  <rect x="720" y="146" width="160" height="40" rx="14" class="note"/>
  <line x1="740" y1="166" x2="780" y2="166" class="lineB"/>
  <text x="796" y="171" class="label">Stock B</text>
  <rect x="700" y="222" width="184" height="78" rx="18" class="note"/>
  <text x="718" y="248" class="label">What to watch</text>
  <text x="718" y="270" class="label">Two lines that usually</text>
  <text x="718" y="290" class="label">move together drift apart</text>
</svg>
