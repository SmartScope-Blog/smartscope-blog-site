<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Backtest Workflow and Three Traps</title>
  <desc id="desc">Backtest steps from idea to decision, plus three common traps.</desc>
  <style>
    .title { font: 700 28px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .step { fill: #f7f7f5; stroke: #888780; stroke-width: 1.8; }
    .step-ok { fill: #effaf6; stroke: #1d9e75; stroke-width: 1.8; }
    .warn { fill: #fdf0ec; stroke: #d85a30; stroke-width: 1.6; stroke-dasharray: 8 5; }
    .label { font: 700 18px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #2d2d29; }
    .body { font: 14px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #4f4f49; }
    .small { font: 12px 'Segoe UI', 'Noto Sans JP', sans-serif; fill: #66655f; }
    .arrow { stroke: #888780; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
    .warnlink { stroke: #d85a30; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#888780"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#ffffff" rx="28"/>
  <text x="34" y="42" class="title">Backtest Flow and Three Traps</text>

  <rect x="54" y="76" width="330" height="54" rx="18" class="step"/>
  <text x="219" y="110" text-anchor="middle" class="label">1. Form a hypothesis</text>

  <rect x="54" y="146" width="330" height="54" rx="18" class="step"/>
  <text x="219" y="180" text-anchor="middle" class="label">2. Write trading rules</text>

  <rect x="54" y="216" width="330" height="54" rx="18" class="step"/>
  <text x="219" y="250" text-anchor="middle" class="label">3. Test on past data</text>

  <rect x="54" y="286" width="330" height="54" rx="18" class="step"/>
  <text x="219" y="320" text-anchor="middle" class="label">4. Review results</text>

  <rect x="54" y="356" width="330" height="70" rx="18" class="step"/>
  <text x="219" y="388" text-anchor="middle" class="label">5. Retest on split periods</text>
  <text x="219" y="410" text-anchor="middle" class="small">Train period / check period</text>

  <rect x="54" y="446" width="330" height="62" rx="20" class="step-ok"/>
  <text x="219" y="484" text-anchor="middle" class="label">6. Decide go or kill</text>

  <path d="M219 130 L219 146" class="arrow"/>
  <path d="M219 200 L219 216" class="arrow"/>
  <path d="M219 270 L219 286" class="arrow"/>
  <path d="M219 340 L219 356" class="arrow"/>
  <path d="M219 426 L219 446" class="arrow"/>

  <rect x="470" y="126" width="420" height="82" rx="18" class="warn"/>
  <text x="494" y="156" class="label" fill="#d85a30">Look-ahead Bias</text>
  <text x="494" y="180" class="body">Using information that</text>
  <text x="494" y="200" class="body">was not known at the time</text>

  <rect x="470" y="236" width="420" height="82" rx="18" class="warn"/>
  <text x="494" y="266" class="label" fill="#d85a30">Survivorship Bias</text>
  <text x="494" y="290" class="body">Looking only at stocks</text>
  <text x="494" y="310" class="body">that survived to today</text>

  <rect x="470" y="346" width="420" height="82" rx="18" class="warn"/>
  <text x="494" y="376" class="label" fill="#d85a30">Overfitting</text>
  <text x="494" y="400" class="body">Tuning too closely to</text>
  <text x="494" y="420" class="body">past data only</text>

  <path d="M384 172 C430 172, 440 168, 470 168" class="warnlink"/>
  <path d="M384 243 C430 243, 440 277, 470 277" class="warnlink"/>
  <path d="M384 321 C430 321, 440 387, 470 387" class="warnlink"/>
</svg>
