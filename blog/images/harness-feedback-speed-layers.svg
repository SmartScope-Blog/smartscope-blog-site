<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">フィードバック速度の階層</title>
  <desc id="desc">PostToolUse Hook(ms)、プリコミットフック(秒)、CI(分)、人間レビュー(時間〜日)の4階層を横棒で示し、左ほど速く機械的に強制可能であることを表す</desc>

  <!-- Title -->
  <text x="20" y="24" fill="#2C2C2A" font-size="14" font-weight="700">フィードバック速度の階層</text>

  <!-- Speed axis labels -->
  <text x="20" y="44" fill="#1D9E75" font-size="11" font-weight="700">← 速い（機械的に強制）</text>
  <text x="780" y="44" text-anchor="end" fill="#5F5E5A" font-size="11" font-weight="700">遅い（人手） →</text>

  <!-- Row 1: PostToolUse Hook (ms) -->
  <rect x="120" y="56" width="80" height="26" rx="4" fill="#0E5A40"/>
  <text x="124" y="74" fill="#FFFFFF" font-size="11" font-weight="700">ms</text>
  <text x="20" y="74" fill="#0E5A40" font-size="11" font-weight="700">PostToolUse Hook</text>
  <text x="210" y="74" fill="#5F5E5A" font-size="11">settings.json PostToolUse</text>

  <!-- Row 2: Pre-commit (sec) -->
  <rect x="120" y="92" width="160" height="26" rx="4" fill="#1D9E75"/>
  <text x="124" y="110" fill="#FFFFFF" font-size="11" font-weight="700">秒</text>
  <text x="20" y="110" fill="#1D9E75" font-size="11" font-weight="700">プリコミットフック</text>
  <text x="290" y="110" fill="#5F5E5A" font-size="11">git pre-commit hook</text>

  <!-- Row 3: CI (min) -->
  <rect x="120" y="128" width="320" height="26" rx="4" fill="#185FA5"/>
  <text x="124" y="146" fill="#FFFFFF" font-size="11" font-weight="700">分</text>
  <text x="20" y="146" fill="#185FA5" font-size="11" font-weight="700">CI</text>
  <text x="450" y="146" fill="#5F5E5A" font-size="11">GitHub Actions</text>

  <!-- Row 4: Human review (hours - days) -->
  <rect x="120" y="164" width="580" height="26" rx="4" fill="#6E6D68"/>
  <text x="124" y="182" fill="#FFFFFF" font-size="11" font-weight="700">時間〜日</text>
  <text x="20" y="182" fill="#3F3E3B" font-size="11" font-weight="700">人間レビュー</text>
  <text x="710" y="182" fill="#5F5E5A" font-size="11">PR Review</text>

  <!-- Caption -->
  <text x="20" y="216" fill="#5F5E5A" font-size="11">左ほど機械的に強制 → エージェントの自己修正が効く。同じ「リンターを実行」でも、Hookで強制すれば「例外なく毎回」、CLAUDE.mdでお願いすれば「ほぼ毎回」。</text>
</svg>
