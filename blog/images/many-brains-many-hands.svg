<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" width="620" height="460" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">多頭脳・多手足のスケーリング構成</title>
  <desc id="desc">複数の頭脳が複数の手足を多対多で共有し、頭脳間で手足を受け渡せる構造を示す</desc>

  <text x="310" y="28" text-anchor="middle" fill="#5F5E5A" font-size="15" font-weight="700">分離IF が同じ → 多対多で水平スケール可能</text>

  <!-- Top: Brains -->
  <g>
    <rect x="110" y="60" width="180" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="200" y="88" text-anchor="middle" fill="#463F9F" font-size="13" font-weight="700">頭脳 A</text>
    <text x="200" y="108" text-anchor="middle" fill="#463F9F" font-size="11" opacity="0.85">Claude Code harness</text>
    <text x="200" y="124" text-anchor="middle" fill="#463F9F" font-size="11" opacity="0.85">session X を保持</text>
  </g>
  <g>
    <rect x="330" y="60" width="180" height="80" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
    <text x="420" y="88" text-anchor="middle" fill="#463F9F" font-size="13" font-weight="700">頭脳 B</text>
    <text x="420" y="108" text-anchor="middle" fill="#463F9F" font-size="11" opacity="0.85">タスク特化 harness</text>
    <text x="420" y="124" text-anchor="middle" fill="#463F9F" font-size="11" opacity="0.85">session Y を保持</text>
  </g>

  <!-- Dashed arrow between brains: hand passing -->
  <line x1="290" y1="100" x2="330" y2="100" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrSm)"/>
  <text x="310" y="54" text-anchor="middle" fill="#5F5E5A" font-size="11" opacity="0.9">手足の受け渡し（同じ execute IF）</text>

  <!-- Crossing arrows -->
  <g stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arr3)">
    <path d="M170,142 L110,260"/>
    <path d="M230,142 L310,260"/>
    <path d="M390,142 L310,260"/>
    <path d="M450,142 L510,260"/>
  </g>

  <!-- Bottom: Hands -->
  <g>
    <rect x="40" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="110" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">手足 1</text>
    <text x="110" y="312" text-anchor="middle" fill="#0F6E56" font-size="11">コンテナ</text>
    <text x="110" y="328" text-anchor="middle" fill="#0F6E56" font-size="11" opacity="0.85">execute()</text>
  </g>
  <g>
    <rect x="240" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="310" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">手足 2</text>
    <text x="310" y="312" text-anchor="middle" fill="#0F6E56" font-size="11">MCPサーバー</text>
    <text x="310" y="328" text-anchor="middle" fill="#0F6E56" font-size="11" opacity="0.85">execute()</text>
  </g>
  <g>
    <rect x="440" y="266" width="140" height="78" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.8"/>
    <text x="510" y="292" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">手足 3</text>
    <text x="510" y="312" text-anchor="middle" fill="#0F6E56" font-size="11">顧客VPC</text>
    <text x="510" y="328" text-anchor="middle" fill="#0F6E56" font-size="11" opacity="0.85">execute()</text>
  </g>

  <!-- Bottom notes -->
  <text x="310" y="380" text-anchor="middle" fill="#463F9F" font-size="13">ハーネスはステートレス → 水平スケール可能</text>
  <text x="310" y="398" text-anchor="middle" fill="#0F6E56" font-size="13">手足は execute() IF 統一 → コンテナでもMCPでも同じ</text>
  <text x="310" y="424" text-anchor="middle" fill="#5F5E5A" font-size="14" font-weight="700">TTFT: p50 約 60% 減、p95 90%+ 減（コンテナ起動を待たず即推論）</text>

  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#888780" stroke-width="1"/>
    </marker>
    <marker id="arrSm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#5F5E5A" stroke-width="1"/>
    </marker>
  </defs>
</svg>
