<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">ハーネスエンジニアリングの4象限</title>
  <desc id="desc">アーキテクチャ制約・フィードバックループ・ワークフロー制御・改善サイクルの4象限が中央のコンテキストエンジニアリングを取り囲む構造図</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <!-- Outer frame -->
  <rect x="20" y="40" width="760" height="520" rx="14" fill="none" stroke="#0F6E56" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="68" text-anchor="middle" fill="#0F6E56" font-size="15" font-weight="700">ハーネスエンジニアリング（System-Wide Design &amp; Control）</text>

  <!-- Top-Left: アーキテクチャ制約 (coral) -->
  <rect x="50" y="100" width="290" height="170" rx="12" fill="#FBE7DF" stroke="#D85A30" stroke-width="2"/>
  <text x="65" y="124" fill="#D85A30" font-size="14" font-weight="700">アーキテクチャ制約</text>
  <text x="65" y="142" fill="#D85A30" font-size="11" font-style="italic">問い：「何を防ぐか」</text>
  <text x="65" y="170" fill="#7A2F12" font-size="11">・リンター</text>
  <text x="65" y="190" fill="#7A2F12" font-size="11">・構造テスト</text>
  <text x="65" y="210" fill="#7A2F12" font-size="11">・依存方向ルール</text>

  <!-- Top-Right: フィードバックループ (teal-feedback) -->
  <rect x="460" y="100" width="290" height="170" rx="12" fill="#DFF4EA" stroke="#1D9E75" stroke-width="2"/>
  <text x="475" y="124" fill="#1D9E75" font-size="14" font-weight="700">フィードバックループ</text>
  <text x="475" y="142" fill="#1D9E75" font-size="11" font-style="italic">問い：「何を計測するか」</text>
  <text x="475" y="170" fill="#0E5A40" font-size="11">・CI/CD連携</text>
  <text x="475" y="190" fill="#0E5A40" font-size="11">・オブザーバビリティ</text>
  <text x="475" y="210" fill="#0E5A40" font-size="11">・メトリクス／ログ</text>

  <!-- Bottom-Left: ワークフロー制御 (blue) -->
  <rect x="50" y="320" width="290" height="170" rx="12" fill="#E3EEFB" stroke="#378ADD" stroke-width="2"/>
  <text x="65" y="344" fill="#185FA5" font-size="14" font-weight="700">ワークフロー制御</text>
  <text x="65" y="362" fill="#185FA5" font-size="11" font-style="italic">問い：「どう走らせるか」</text>
  <text x="65" y="390" fill="#0F3A66" font-size="11">・タスク分割／並列化</text>
  <text x="65" y="410" fill="#0F3A66" font-size="11">・権限管理</text>
  <text x="65" y="430" fill="#0F3A66" font-size="11">・HitL制御</text>

  <!-- Bottom-Right: 改善サイクル (pink) -->
  <rect x="460" y="320" width="290" height="170" rx="12" fill="#FAE3EC" stroke="#D4537E" stroke-width="2"/>
  <text x="475" y="344" fill="#D4537E" font-size="14" font-weight="700">改善サイクル</text>
  <text x="475" y="362" fill="#D4537E" font-size="11" font-style="italic">問い：「どう維持するか」</text>
  <text x="475" y="390" fill="#7A2A48" font-size="11">・エントロピー対策</text>
  <text x="475" y="410" fill="#7A2A48" font-size="11">・自動クリーンアップ</text>
  <text x="475" y="430" fill="#7A2A48" font-size="11">・ドキュメント鮮度</text>

  <!-- Center: コンテキストエンジニアリング -->
  <rect x="345" y="265" width="110" height="60" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="700">コンテキスト</text>
  <text x="400" y="306" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="700">エンジニアリング</text>
  <text x="400" y="318" text-anchor="middle" fill="#185FA5" font-size="9">What the LLM Sees</text>

  <!-- Arrows from each quadrant to center -->
  <line x1="320" y1="270" x2="350" y2="278" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="270" x2="450" y2="278" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="320" x2="350" y2="312" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="320" x2="450" y2="312" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <text x="400" y="540" text-anchor="middle" fill="#5F5E5A" font-size="11">4象限がコンテキスト層を取り囲み、システム全体の品質を仕組みで担保する</text>
</svg>
