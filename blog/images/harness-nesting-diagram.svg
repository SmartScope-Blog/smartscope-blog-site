<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">ハーネス・コンテキスト・プロンプトの3層入れ子構造</title>
  <desc id="desc">ハーネスエンジニアリング(teal)の中にコンテキストエンジニアリング(blue)、その中にプロンプトエンジニアリング(purple)が入れ子で配置され、それぞれの層に対応する技術タグと馬メタファー対応表が示されている</desc>

  <!-- Outer: Harness -->
  <rect x="20" y="40" width="540" height="440" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <text x="40" y="68" fill="#0F6E56" font-size="16" font-weight="700">ハーネスエンジニアリング</text>
  <text x="40" y="88" fill="#0F6E56" font-size="11">エージェントが動くシステム全体を最適化</text>

  <!-- Middle: Context -->
  <rect x="50" y="110" width="480" height="320" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="70" y="138" fill="#185FA5" font-size="15" font-weight="700">コンテキストエンジニアリング</text>
  <text x="70" y="156" fill="#185FA5" font-size="11">LLMが見るすべてを最適化</text>

  <!-- Inner: Prompt -->
  <rect x="80" y="180" width="420" height="100" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
  <text x="100" y="210" fill="#534AB7" font-size="14" font-weight="700">プロンプトエンジニアリング</text>
  <text x="100" y="230" fill="#534AB7" font-size="11">LLMへの指示テキストを最適化</text>
  <text x="100" y="252" fill="#534AB7" font-size="10" opacity="0.85">人間が書く指示・例示・出力フォーマット</text>

  <!-- Context tags (5) inside middle, below inner -->
  <g font-size="10" fill="#185FA5">
    <rect x="80"  y="305" width="62" height="22" rx="11" fill="#FFFFFF" stroke="#185FA5"/><text x="111" y="320" text-anchor="middle">RAG</text>
    <rect x="152" y="305" width="62" height="22" rx="11" fill="#FFFFFF" stroke="#185FA5"/><text x="183" y="320" text-anchor="middle">MCP</text>
    <rect x="224" y="305" width="78" height="22" rx="11" fill="#FFFFFF" stroke="#185FA5"/><text x="263" y="320" text-anchor="middle">Memory</text>
    <rect x="312" y="305" width="78" height="22" rx="11" fill="#FFFFFF" stroke="#185FA5"/><text x="351" y="320" text-anchor="middle">Schema</text>
    <rect x="400" y="305" width="100" height="22" rx="11" fill="#FFFFFF" stroke="#185FA5"/><text x="450" y="320" text-anchor="middle">ツール定義</text>
  </g>
  <text x="80" y="350" font-size="10" fill="#185FA5" opacity="0.8">+ メッセージ履歴・出力スキーマ・取得結果 …</text>

  <!-- Harness tags (4) inside outer, below middle -->
  <g font-size="11" fill="#0F6E56">
    <rect x="40"  y="442" width="92" height="24" rx="12" fill="#FFFFFF" stroke="#0F6E56"/><text x="86"  y="458" text-anchor="middle">リンター</text>
    <rect x="142" y="442" width="92" height="24" rx="12" fill="#FFFFFF" stroke="#0F6E56"/><text x="188" y="458" text-anchor="middle">CI連携</text>
    <rect x="244" y="442" width="120" height="24" rx="12" fill="#FFFFFF" stroke="#0F6E56"/><text x="304" y="458" text-anchor="middle">タスク分割</text>
    <rect x="374" y="442" width="156" height="24" rx="12" fill="#FFFFFF" stroke="#0F6E56"/><text x="452" y="458" text-anchor="middle">エントロピー対策</text>
  </g>

  <!-- Right side: Horse metaphor table -->
  <g>
    <text x="590" y="68" fill="#5F5E5A" font-size="12" font-weight="700">馬メタファー対応</text>
    <line x1="590" y1="78" x2="780" y2="78" stroke="#9E9D98" stroke-width="1"/>

    <rect x="590" y="92" width="190" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="600" y="112" fill="#534AB7" font-size="11" font-weight="700">声かけ</text>
    <text x="600" y="132" fill="#534AB7" font-size="11">→ プロンプト</text>

    <rect x="590" y="160" width="190" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text x="600" y="180" fill="#185FA5" font-size="11" font-weight="700">地図</text>
    <text x="600" y="200" fill="#185FA5" font-size="11">→ コンテキスト</text>

    <rect x="590" y="228" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="600" y="248" fill="#0F6E56" font-size="11" font-weight="700">手綱・鞍・柵</text>
    <text x="600" y="268" fill="#0F6E56" font-size="11">→ ハーネス</text>

    <text x="590" y="312" fill="#5F5E5A" font-size="10" opacity="0.85">CPUとOSの関係に近い：</text>
    <text x="590" y="328" fill="#5F5E5A" font-size="10" opacity="0.85">モデル(CPU)が高性能でも</text>
    <text x="590" y="344" fill="#5F5E5A" font-size="10" opacity="0.85">ハーネス(OS)が貧弱なら</text>
    <text x="590" y="360" fill="#5F5E5A" font-size="10" opacity="0.85">パフォーマンスは出ない。</text>
  </g>
</svg>
