<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Claude Codeのハーネス・インテグレーションポイント</title>
  <desc id="desc">中央にClaude Codeを配置し、上のレーンにハーネス層(Commands, Hooks, Permissions)、下のレーンにコンテキスト層(CLAUDE.md, Skills, MCP Servers)を示すスイムレーン図</desc>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F5E5A"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" fill="#2C2C2A" font-size="14" font-weight="700">Claude Codeのハーネス・インテグレーションポイント</text>

  <!-- Upper swimlane: Harness -->
  <rect x="20" y="50" width="760" height="160" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
  <text x="36" y="72" fill="#0F6E56" font-size="12" font-weight="700">ハーネス層</text>
  <text x="36" y="88" fill="#0F6E56" font-size="11">仕組みで品質を担保する</text>

  <!-- Commands -->
  <rect x="60" y="100" width="200" height="92" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="160" y="124" text-anchor="middle" fill="#0F6E56" font-size="13" font-weight="700">Commands</text>
  <text x="160" y="144" text-anchor="middle" fill="#5F5E5A" font-size="11">定型タスクの再現可能な実行</text>
  <rect x="80" y="158" width="160" height="22" rx="11" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="160" y="173" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">ワークフロー制約</text>

  <!-- Hooks -->
  <rect x="300" y="100" width="200" height="92" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="400" y="124" text-anchor="middle" fill="#0F6E56" font-size="13" font-weight="700">Hooks</text>
  <text x="400" y="144" text-anchor="middle" fill="#5F5E5A" font-size="11">特定イベント時の自動処理</text>
  <rect x="320" y="158" width="160" height="22" rx="11" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="400" y="173" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">フィードバックループ</text>

  <!-- Permissions -->
  <rect x="540" y="100" width="200" height="92" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" fill="#0F6E56" font-size="13" font-weight="700">Permissions</text>
  <text x="640" y="144" text-anchor="middle" fill="#5F5E5A" font-size="11">自動承認の範囲設定</text>
  <rect x="560" y="158" width="160" height="22" rx="11" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="640" y="173" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">アーキテクチャ制約</text>

  <!-- Arrows from upper boxes down to Claude Code -->
  <line x1="160" y1="192" x2="340" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="400" y1="192" x2="400" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="640" y1="192" x2="460" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Center: Claude Code -->
  <rect x="290" y="240" width="220" height="64" rx="32" fill="#0F6E56" stroke="#0E5A40" stroke-width="2"/>
  <text x="400" y="270" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">Claude Code</text>
  <text x="400" y="290" text-anchor="middle" fill="#E1F5EE" font-size="11">エージェント</text>

  <!-- Arrows from Claude Code down to lower boxes -->
  <line x1="160" y1="352" x2="340" y2="304" stroke="#5F5E5A" stroke-width="1.5" marker-start="url(#arrow2)"/>
  <line x1="400" y1="352" x2="400" y2="304" stroke="#5F5E5A" stroke-width="1.5" marker-start="url(#arrow2)"/>
  <line x1="640" y1="352" x2="460" y2="304" stroke="#5F5E5A" stroke-width="1.5" marker-start="url(#arrow2)"/>

  <!-- Lower swimlane: Context -->
  <rect x="20" y="334" width="760" height="130" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
  <text x="36" y="356" fill="#185FA5" font-size="12" font-weight="700">コンテキスト層</text>
  <text x="36" y="372" fill="#185FA5" font-size="11">LLMが見るすべてを設計する</text>

  <!-- CLAUDE.md -->
  <rect x="60" y="384" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.5"/>
  <text x="160" y="406" text-anchor="middle" fill="#185FA5" font-size="13" font-weight="700">CLAUDE.md</text>
  <text x="160" y="424" text-anchor="middle" fill="#5F5E5A" font-size="11">リポジトリ知識の段階的開示</text>
  <text x="160" y="442" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="700">構造化</text>

  <!-- Skills -->
  <rect x="300" y="384" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.5"/>
  <text x="400" y="406" text-anchor="middle" fill="#185FA5" font-size="13" font-weight="700">Skills</text>
  <text x="400" y="424" text-anchor="middle" fill="#5F5E5A" font-size="11">ベストプラクティスの注入</text>
  <text x="400" y="442" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="700">構造化</text>

  <!-- MCP Servers -->
  <rect x="540" y="384" width="200" height="68" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="1.5"/>
  <text x="640" y="406" text-anchor="middle" fill="#185FA5" font-size="13" font-weight="700">MCP Servers</text>
  <text x="640" y="424" text-anchor="middle" fill="#5F5E5A" font-size="11">外部ツール・データへの接続</text>
  <text x="640" y="442" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="700">取得</text>
</svg>
