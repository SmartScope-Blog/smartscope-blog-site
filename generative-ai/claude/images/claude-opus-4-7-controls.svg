<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" width="980" height="430" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" font-weight="700" role="img" aria-labelledby="title desc">
  <title id="title">Claude Opus 4.7 の運用制御点</title>
  <desc id="desc">Claude Opus 4.7 で運用側が制御できる要素として xhigh、Task Budgets、/ultrareview の役割を示す図</desc>

  <rect x="24" y="20" width="932" height="390" rx="18" fill="#F6F3EC" stroke="#C7C0B1"/>
  <text x="490" y="56" text-anchor="middle" fill="#33312D" font-size="24" font-weight="700">Claude Opus 4.7 の運用制御点</text>
  <text x="490" y="84" text-anchor="middle" fill="#5F5E5A" font-size="14">「強くなった」だけで終わらず、どこで深さと予算を制御するかを見る</text>

  <rect x="52" y="126" width="276" height="214" rx="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2.2"/>
  <text x="78" y="160" fill="#A6431F" font-size="14" font-weight="700">xhigh</text>
  <text x="78" y="196" fill="#A6431F" font-size="24" font-weight="700">深く考えさせる</text>
  <text x="78" y="224" fill="#5F5E5A" font-size="12">high と max の間。coding と</text>
  <text x="78" y="242" fill="#5F5E5A" font-size="12">agentic use case の推奨起点</text>
  <rect x="78" y="266" width="194" height="14" rx="7" fill="#F3D2C8"/>
  <rect x="78" y="266" width="146" height="14" rx="7" fill="#D85A30"/>
  <text x="78" y="306" fill="#5F5E5A" font-size="12">効果: 複雑タスクの精度が上がりやすい</text>
  <text x="78" y="324" fill="#5F5E5A" font-size="12">副作用: later turns の token も増えやすい</text>

  <rect x="352" y="126" width="276" height="214" rx="18" fill="#E8F1FB" stroke="#378ADD" stroke-width="2.2"/>
  <text x="378" y="160" fill="#1F5C94" font-size="14" font-weight="700">Task Budgets</text>
  <text x="378" y="196" fill="#1F5C94" font-size="24" font-weight="700">予算を暴れさせない</text>
  <text x="378" y="224" fill="#5F5E5A" font-size="12">硬い stop ではなく、agentic loop 全体の</text>
  <text x="378" y="242" fill="#5F5E5A" font-size="12">助言的 budget として仕事量を調整させる</text>
  <rect x="378" y="266" width="44" height="26" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
  <rect x="430" y="266" width="44" height="26" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
  <rect x="482" y="266" width="44" height="26" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
  <rect x="534" y="266" width="44" height="26" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
  <text x="400" y="283" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">plan</text>
  <text x="452" y="283" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">tool</text>
  <text x="504" y="283" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">retry</text>
  <text x="556" y="283" text-anchor="middle" fill="#1F5C94" font-size="11" font-weight="700">stop</text>
  <text x="378" y="324" fill="#5F5E5A" font-size="12">効果: 長いタスクを止めすぎずに調整できる</text>

  <rect x="652" y="126" width="276" height="214" rx="18" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2.2"/>
  <text x="678" y="160" fill="#0F6E56" font-size="14" font-weight="700">/ultrareview</text>
  <text x="678" y="188" fill="#0F6E56" font-size="20" font-weight="700">レビュー専用に</text>
  <text x="678" y="212" fill="#0F6E56" font-size="20" font-weight="700">切り出す</text>
  <text x="678" y="232" fill="#5F5E5A" font-size="12">Claude Code が変更全体を読み込み、</text>
  <text x="678" y="250" fill="#5F5E5A" font-size="12">バグや設計問題を拾う専用セッション</text>
  <rect x="678" y="272" width="56" height="28" rx="14" fill="#FFFFFF" stroke="#1D9E75"/>
  <rect x="749" y="272" width="56" height="28" rx="14" fill="#FFFFFF" stroke="#1D9E75"/>
  <rect x="820" y="272" width="56" height="28" rx="14" fill="#FFFFFF" stroke="#1D9E75"/>
  <text x="706" y="290" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">読込</text>
  <text x="777" y="290" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">抽出</text>
  <text x="848" y="290" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">返却</text>
  <text x="741" y="289" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">→</text>
  <text x="812" y="289" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">→</text>
  <text x="678" y="324" fill="#5F5E5A" font-size="12">効果: 実装とレビューを混ぜずに精度を上げる</text>

  <rect x="122" y="362" width="736" height="24" rx="12" fill="#FFFFFF" stroke="#C7C0B1"/>
  <text x="490" y="378" text-anchor="middle" fill="#33312D" font-size="13" font-weight="700">4.7 はモデル単体ではなく、reasoning depth と token budget の制御もセットで見る</text>
</svg>
