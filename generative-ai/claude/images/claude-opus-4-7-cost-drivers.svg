<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" width="980" height="500" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" font-weight="700" role="img" aria-labelledby="title desc">
  <title id="title">Claude Opus 4.7 でコストが増えやすい3要因</title>
  <desc id="desc">Claude Opus 4.7 の実効コストを押し上げやすい3要因として tokenizer、vision、xhigh effort を示す図</desc>

  <rect x="24" y="20" width="932" height="460" rx="18" fill="#F6F3EC" stroke="#C7C0B1"/>
  <text x="490" y="56" text-anchor="middle" fill="#33312D" font-size="24" font-weight="700">Claude Opus 4.7 でコストが増えやすい3要因</text>
  <text x="490" y="84" text-anchor="middle" fill="#5F5E5A" font-size="14">単価は据え置きでも、token 数の増え方が 4.6 と同じとは限らない</text>

  <rect x="52" y="126" width="276" height="252" rx="18" fill="#E8F1FB" stroke="#378ADD" stroke-width="2.2"/>
  <text x="78" y="160" fill="#1F5C94" font-size="14" font-weight="700">1. Tokenizer</text>
  <text x="78" y="198" fill="#1F5C94" font-size="34" font-weight="700">1.00x - 1.35x</text>
  <text x="78" y="226" fill="#5F5E5A" font-size="12">同じ内容でも token 数が増える可能性</text>
  <rect x="78" y="252" width="208" height="16" rx="8" fill="#D7E7FA"/>
  <rect x="78" y="252" width="208" height="16" rx="8" fill="#378ADD" opacity="0.25"/>
  <text x="78" y="292" fill="#5F5E5A" font-size="12">価格表より先に、count_tokens と</text>
  <text x="78" y="310" fill="#5F5E5A" font-size="12">client-side estimate を取り直す必要がある</text>

  <rect x="352" y="126" width="276" height="252" rx="18" fill="#FFF0D7" stroke="#D9991B" stroke-width="2.2"/>
  <text x="378" y="160" fill="#9A6200" font-size="14" font-weight="700">2. Vision</text>
  <text x="378" y="198" fill="#9A6200" font-size="24" font-weight="700">1,568px → 2,576px</text>
  <text x="378" y="226" fill="#5F5E5A" font-size="12">高解像度は自動で有効になる</text>
  <rect x="378" y="254" width="70" height="14" rx="7" fill="#CFC8BC"/>
  <rect x="378" y="282" width="210" height="14" rx="7" fill="#D9991B"/>
  <text x="460" y="265" fill="#5F5E5A" font-size="11">旧: 最大約 1,600 tokens</text>
  <text x="596" y="293" text-anchor="end" fill="#9A6200" font-size="11" font-weight="700">新: 最大約 4,784 tokens</text>
  <text x="378" y="326" fill="#5F5E5A" font-size="12">UI や図表の精度は上がるが、</text>
  <text x="378" y="344" fill="#5F5E5A" font-size="12">画像を多投する運用はそのまま重くなる</text>

  <rect x="652" y="126" width="276" height="252" rx="18" fill="#FAECE7" stroke="#D85A30" stroke-width="2.2"/>
  <text x="678" y="160" fill="#A6431F" font-size="14" font-weight="700">3. Effort</text>
  <text x="678" y="198" fill="#A6431F" font-size="24" font-weight="700">xhigh 新設</text>
  <text x="678" y="226" fill="#5F5E5A" font-size="12">high と max の間に入る新しい深度</text>
  <rect x="678" y="254" width="42" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <rect x="726" y="254" width="54" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <rect x="786" y="254" width="62" height="28" rx="8" fill="#FDE0D6" stroke="#D85A30"/>
  <rect x="854" y="254" width="46" height="28" rx="8" fill="#FFFFFF" stroke="#D85A30"/>
  <text x="699" y="272" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">high</text>
  <text x="753" y="272" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">xhigh</text>
  <text x="817" y="272" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">NEW</text>
  <text x="877" y="272" text-anchor="middle" fill="#A6431F" font-size="11" font-weight="700">max</text>
  <text x="678" y="308" fill="#5F5E5A" font-size="11">coding と agentic use case の推奨起点。</text>
  <text x="678" y="326" fill="#5F5E5A" font-size="11">後半ターンほど thinking と output が</text>
  <text x="678" y="342" fill="#5F5E5A" font-size="11">増えやすい</text>

  <rect x="122" y="426" width="736" height="28" rx="14" fill="#FFFFFF" stroke="#C7C0B1"/>
  <text x="490" y="445" text-anchor="middle" fill="#33312D" font-size="13" font-weight="700">4.7 のコスト増は「値上げ」より「同じ仕事でも token が増えやすい」に近い</text>
</svg>
