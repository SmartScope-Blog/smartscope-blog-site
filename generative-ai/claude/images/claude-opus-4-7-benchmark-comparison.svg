  <rect x="126" y="194" width="525" height="10" rx="5" fill="#378ADD"/>
  <text x="666" y="202" fill="#33312D" font-size="12" font-weight="700">100</text>
  <text x="64" y="220" fill="#5F5E5A" font-size="11">Opus 4.7</text>
  <rect x="126" y="212" width="593" height="10" rx="5" fill="#E4A83C"/>
  <text x="734" y="220" fill="#33312D" font-size="12" font-weight="700">113</text>

  <!-- Cursor -->
  <rect x="44" y="244" width="892" height="110" rx="14" fill="#FFFFFF" stroke="#D8D1C4"/>
