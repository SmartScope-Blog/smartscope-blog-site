  <text x="64" y="162" fill="#33312D" font-size="16" font-weight="700">93-task coding benchmark</text>
  <text x="64" y="182" fill="#5F5E5A" font-size="11">解決率指数。Opus 4.6 = 100</text>
  <rect x="834" y="130" width="78" height="26" rx="13" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="873" y="147" text-anchor="middle" fill="#0F6E56" font-size="12" font-weight="700">+13%</text>
