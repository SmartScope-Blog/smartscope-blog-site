<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1120" width="980" height="1120" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif" font-weight="700" role="img" aria-labelledby="title desc">
  <title id="title">Claude Opus 4.7 ベンチマーク比較</title>
  <desc id="desc">Claude Opus 4.6 と 4.7 の比較。CursorBench、XBOW、Hex、Rakuten、Databricks、Notion、Factory の改善と、Harvey の 4.7 単独値を縦に並べて示す図</desc>

  <rect x="24" y="20" width="932" height="1080" rx="18" fill="#F6F3EC" stroke="#C7C0B1"/>
  <text x="56" y="56" fill="#33312D" font-size="24" font-weight="700">Claude Opus 4.7 ベンチマーク比較</text>
  <text x="56" y="82" fill="#5F5E5A" font-size="13">絶対値があるものは実数、差分だけが公開されたものは Opus 4.6 = 100 の相対指数で表示</text>

  <rect x="710" y="38" width="210" height="46" rx="12" fill="#FFFFFF" stroke="#C7C0B1"/>
  <rect x="728" y="54" width="22" height="10" rx="5" fill="#378ADD"/>
  <text x="758" y="63" fill="#5F5E5A" font-size="12">Opus 4.6</text>
  <rect x="816" y="54" width="22" height="10" rx="5" fill="#E4A83C"/>
  <text x="846" y="63" fill="#5F5E5A" font-size="12">Opus 4.7</text>

  <!-- Hex -->
