  <text x="64" y="832" fill="#5F5E5A" font-size="11">Opus 4.6</text>
  <rect x="126" y="824" width="630" height="10" rx="5" fill="#378ADD"/>
  <text x="771" y="832" fill="#33312D" font-size="12" font-weight="700">100</text>
  <text x="64" y="850" fill="#5F5E5A" font-size="11">Opus 4.7</text>
